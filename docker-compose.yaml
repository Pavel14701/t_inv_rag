services:
  postgres:
    image: postgres:18.0
    container_name: t_invest-agent-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./backups/pg_data:/var/lib/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.2.2-alpine
    container_name: t_invest-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - ./backups/redis_data:/data
    command: >
      redis-server --requirepass ${REDIS_PASS} --user ${REDIS_USER} on >${REDIS_USER_PASS} ~* +@all --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2.0-management-alpine
    container_name: t_invest-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${MQ_USER}
      - RABBITMQ_DEFAULT_PASS=${MQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.3-gpu-nvidia
    container_name: t_invest-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ENABLE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.16.1
    container_name: t_invest-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_LOAD_TIMEOUT=5m 
      - OLLAMA_MAX_VRAM=8589934592 
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: [ "/usr/bin/bash", "-c" ]
    command: 
      - |
        /bin/ollama serve &
        sleep 10
        echo "--- Pulling DeepSeek-R1 8B ---"
        ollama pull deepseek-r1:8b
        wait
    restart: unless-stopped